<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAM Admin · Acceso clientes</title>
<style>
  :root {
    --negro: #0d0d0d;
    --gris: #1a1a1a;
    --naranja: #e8941a;
    --blanco: #f5f5f0;
    --texto: #aaaaaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--negro);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: var(--blanco);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 480px;
    padding: 40px 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 40px;
  }
  .logo img { width: 180px; }
  h1 {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--naranja);
    text-align: center;
    margin-bottom: 32px;
  }
  .card {
    background: var(--gris);
    border-radius: 6px;
    padding: 32px;
  }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--texto);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    color: var(--blanco);
    padding: 12px 16px;
    font-size: 14px;
    border-radius: 3px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--naranja); }
  button {
    width: 100%;
    background: var(--naranja);
    color: var(--negro);
    border: none;
    padding: 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status {
    margin-top: 16px;
    font-size: 13px;
    text-align: center;
    min-height: 20px;
  }
  .err { color: #e85555; }
  .ok  { color: #4caf7d; }

  /* Lista de resultados */
  #resultados { margin-top: 24px; }
  .cliente-card {
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cliente-card:hover { border-color: var(--naranja); }
  .cliente-nombre { font-size: 15px; font-weight: 600; }
  .cliente-empresa { font-size: 12px; color: var(--texto); margin-top: 2px; }
  .cliente-arrow { color: var(--naranja); font-size: 20px; }

  /* Lista todos los clientes */
  #todos-btn {
    margin-top: 16px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: var(--texto);
    font-size: 11px;
  }
  #todos-btn:hover { border-color: var(--naranja); color: var(--naranja); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <img src="https://ramonsalesfabres.github.io/pam_logo_negro.png" alt="PAM Audiovisual"/>
  </div>
  <h1>Panel de acceso · Clientes</h1>

  <div class="card">
    <label>Email del cliente</label>
    <input id="email" type="email" placeholder="cliente@empresa.com" autocomplete="off"
           onkeyup="if(event.key==='Enter') buscar()"/>

    <label>Tu código de acceso</label>
    <input id="codigo" type="password" placeholder="••••••••••••" autocomplete="off"
           onkeyup="if(event.key==='Enter') buscar()"/>

    <button id="btn-buscar" onclick="buscar()">Acceder a la ficha</button>
    <div id="status"></div>
    <div id="resultados"></div>

    <button id="todos-btn" onclick="verTodos()" style="margin-top:16px;">
      Ver todos los clientes
    </button>
  </div>
</div>

<script>
const WORKER = 'https://pam-backblaze.ramon-301.workers.dev';
const FICHA  = 'https://ramonsalesfabres.github.io/ficha_cliente.html';

async function buscar() {
  const email  = document.getElementById('email').value.trim();
  const codigo = document.getElementById('codigo').value.trim();
  const btn    = document.getElementById('btn-buscar');
  const status = document.getElementById('status');
  const resultados = document.getElementById('resultados');

  if (!email || !codigo) {
    status.className = 'err';
    status.textContent = 'Introduce email y código.';
    return;
  }

  btn.disabled = true;
  status.className = '';
  status.textContent = 'Buscando...';
  resultados.innerHTML = '';

  try {
    const res = await fetch(`${WORKER}/api/buscar-cliente`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, adminCode: codigo })
    });
    const data = await res.json();

    if (data.error) {
      status.className = 'err';
      status.textContent = data.error === 'Cliente no encontrado'
        ? 'No hay ningún cliente con ese email.'
        : data.error === 'Código incorrecto'
        ? 'Código incorrecto.'
        : 'Error al buscar.';
    } else {
      status.textContent = '';
      const url = `${FICHA}?id=${data.clientId}&code=${codigo}&auto=1`;
      resultados.innerHTML = `
        <div class="cliente-card" onclick="window.open('${url}','_blank')">
          <div>
            <div class="cliente-nombre">${data.nombre}</div>
            <div class="cliente-empresa">${data.empresa}</div>
          </div>
          <span class="cliente-arrow">›</span>
        </div>`;
    }
  } catch(e) {
    status.className = 'err';
    status.textContent = 'Error de conexión.';
  }

  btn.disabled = false;
}

async function verTodos() {
  const codigo = document.getElementById('codigo').value.trim();
  const status = document.getElementById('status');
  const resultados = document.getElementById('resultados');

  if (!codigo) {
    status.className = 'err';
    status.textContent = 'Introduce primero tu código.';
    return;
  }

  status.className = '';
  status.textContent = 'Cargando clientes...';
  resultados.innerHTML = '';

  try {
    const res = await fetch(`${WORKER}/api/listar-clientes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminCode: codigo })
    });
    const data = await res.json();

    if (data.error) {
      status.className = 'err';
      status.textContent = data.error;
      return;
    }

    status.textContent = '';
    if (!data.clientes || !data.clientes.length) {
      resultados.innerHTML = '<p style="color:#444;text-align:center;margin-top:12px;">No hay clientes todavía.</p>';
      return;
    }

    resultados.innerHTML = data.clientes.map(c => {
      const url = `${FICHA}?id=${c.clientId}&code=${codigo}&auto=1`;
      return `
        <div class="cliente-card" onclick="window.open('${url}','_blank')">
          <div>
            <div class="cliente-nombre">${c.nombre}</div>
            <div class="cliente-empresa">${c.empresa}</div>
          </div>
          <span class="cliente-arrow">›</span>
        </div>`;
    }).join('');
  } catch(e) {
    status.className = 'err';
    status.textContent = 'Error de conexión.';
  }
}
</script>
</body>
</html>
